<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ClawSight</title>
  <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white font-mono h-screen p-6">
  <h1 class="text-2xl font-bold text-emerald-400 mb-6">ClawSight Legacy</h1>
  <div id="status" class="text-xs text-gray-500 mb-4">Connecting...</div>
  <div id="grid" class="grid grid-cols-1 md:grid-cols-3 gap-4"></div>

  <script>
    const socket = io();
    const grid = document.getElementById('grid');
    let agents = {};

    socket.on('connect', () => document.getElementById('status').textContent = 'Connected');
    
    socket.on('agent-update', (agent) => {
      agents[agent.id] = agent;
      render();
    });

    socket.on('init', (list) => {
      list.forEach(a => agents[a.id] = a);
      render();
    });

    function render() {
      grid.innerHTML = Object.values(agents).map(a => `
        <div class="bg-gray-800 p-4 rounded border border-gray-700">
          <div class="font-bold text-white mb-2">${a.name}</div>
          <div class="text-xs text-gray-400 h-24 overflow-y-auto">
            ${(a.logs || []).slice().reverse().map(l => `<div>> ${l.message}</div>`).join('')}
          </div>
        </div>
      `).join('');
    }
  </script>
</body>
</html>
