<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ClawSight</title>
  <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white font-mono h-screen p-6">
  <h1 class="text-2xl font-bold text-emerald-400 mb-6">ClawSight Legacy</h1>
  <div id="status" class="text-xs text-gray-500 mb-4">Connecting...</div>
  <div id="grid" class="grid grid-cols-1 md:grid-cols-3 gap-4"></div>

  <script>
    const socket = io();
    const grid = document.getElementById('grid');
    let agents = {};

    socket.on('connect', () => document.getElementById('status').textContent = 'Connected');
    
    socket.on('agent-update', (agent) => {
      agents[agent.id] = agent;
      render();
    });

    socket.on('init', (list) => {
      list.forEach(a => agents[a.id] = a);
      render();
    });

      // --- BOOT SEQUENCE ---
      boot();

      async function boot() {
        const statusEl = document.getElementById('connection-status');

        // 0. Handle magic link redirect (access_token in hash)
        if (window.location.hash.includes('access_token=')) {
          statusEl.textContent = 'Completing login...';
          const params = new URLSearchParams(window.location.hash.substring(1));
          const access_token = params.get('access_token');
          const refresh_token = params.get('refresh_token');
          if (access_token && refresh_token) {
            await supabaseClient.auth.setSession({ access_token, refresh_token });
            // Clear the hash and force fresh boot with the new session
            window.history.replaceState({}, document.title, window.location.pathname);
            apiKey = null;
            localStorage.removeItem('clawsight_api_key');
            // Fall through to session check below to auto-provision
          }
        }

        // 1. If we have a cached API key, try connecting immediately
        if (apiKey) {
          initSocket();
          return;
        }

        // 2. No API key — check if user has a Supabase session
        statusEl.textContent = 'Checking session...';
        statusEl.className = 'text-xs text-yellow-400 bg-gray-900 px-2 py-1 rounded border border-yellow-600';

        const { data: { session } } = await supabaseClient.auth.getSession();

        if (!session) {
          // No session, no key — redirect to login
          window.location.href = '/login.html';
          return;
        }

        // 3. Session exists but no API key — auto-provision one
        statusEl.textContent = 'Provisioning session key...';
        try {
          const res = await fetch('/api/dashboard-key', {
            method: 'POST',
            headers: { Authorization: `Bearer ${session.access_token}` }
          });
          if (res.ok) {
            const data = await res.json();
            if (data.key) {
              apiKey = data.key;
              localStorage.setItem('clawsight_api_key', apiKey);
            }
          }
        } catch (e) {
          console.error('Failed to provision dashboard key:', e);
        }

        if (!apiKey) {
          // Provisioning failed — show manual key entry
          openKeyModal();
          return;
        }

        // 4. Check if new or returning user to pick default view
        try {
          const statusRes = await fetch('/api/user/status', {
            headers: { Authorization: `Bearer ${session.access_token}` }
          });
          if (statusRes.ok) {
            const userStatus = await statusRes.json();
            isNewUser = userStatus.isNew || !userStatus.hasKeys;
          }
        } catch (e) {
          // Non-critical, default to dashboard view
        }

        initSocket();

        // New users see the setup guide first
        if (isNewUser) {
          showTab('setup');
        }
      }

      keyInput?.addEventListener('keydown', (evt) => {
        if (evt.key === 'Enter') saveApiKey();
      });

      function openKeyModal() {
        modalEl.classList.remove('hidden');
        setTimeout(() => keyInput?.focus(), 100);
      }

      function closeKeyModal() {
        modalEl.classList.add('hidden');
        errorEl.classList.add('hidden');
      }

      function saveApiKey() {
        const value = keyInput.value.trim();
        if (!value || value.length < 12) {
          errorEl.classList.remove('hidden');
          return;
        }
        apiKey = value;
        localStorage.setItem('clawsight_api_key', apiKey);
        setApiKeyDisplay();
        closeKeyModal();
        initSocket();
      }

    function setApiKeyDisplay() {
      const el = document.getElementById('display-api-key');
      if (!el) return;
      el.textContent = apiKey || 'Key Missing';
    }

    function initSocket() {
      if (!apiKey) return;
      const serverUrl = window.location.origin;
      socket = io(serverUrl, { auth: { token: apiKey }, reconnection: false });
      const statusEl = document.getElementById('connection-status');

      socket.on('connect', () => {
        statusEl.textContent = 'Connected';
        statusEl.className = 'text-xs text-emerald-400 bg-gray-900 px-2 py-1 rounded border border-emerald-900';
      });

      socket.on('connect_error', async (err) => {
        statusEl.textContent = 'Key expired — refreshing...';
        statusEl.className = 'text-xs text-yellow-400 bg-gray-900 px-2 py-1 rounded border border-yellow-600';
        socket.disconnect();

        // Try to re-provision a fresh dashboard key from the Supabase session
        const { data: { session } } = await supabaseClient.auth.getSession();
        if (session) {
          try {
            const res = await fetch('/api/dashboard-key', {
              method: 'POST',
              headers: { Authorization: `Bearer ${session.access_token}` }
            });
            if (res.ok) {
              const data = await res.json();
              if (data.key) {
                apiKey = data.key;
                localStorage.setItem('clawsight_api_key', apiKey);
                initSocket(); // Retry with fresh key
                return;
              }
            }
          } catch (e) {
            console.error('Failed to re-provision key:', e);
          }
        }

        // Session is also gone — redirect to login
        statusEl.textContent = 'Session expired';
        statusEl.className = 'text-xs text-red-400 bg-gray-900 px-2 py-1 rounded border border-red-500';
        localStorage.removeItem('clawsight_api_key');
        window.location.href = '/login.html';
      });

      socket.on('agent-update', (agent) => {
        agents[agent.id] = agent;
        updateOrMoveCard(agent); // Smart update
        updateGlobalStats();
      });

      socket.on('init', (data) => {
        agents = {};
        (Array.isArray(data) ? data : Object.values(data)).forEach(a => { agents[a.id] = a; });
        renderAllAgents(); // Initial full render
      });
    }

    // --- RENDER LOGIC ---

    function updateOrMoveCard(agent) {
      const isDead = (agent.status === 'killed' || agent.status === 'error');
      const targetGridId = isDead ? 'agent-grid-history' : 'agent-grid';
      const currentCard = document.getElementById(`agent-${agent.id}`);
      
      // If card exists but is in wrong grid, move it
      if (currentCard && currentCard.parentElement.id !== targetGridId) {
        currentCard.remove();
        renderCard(agent, document.getElementById(targetGridId), isDead);
      } else if (currentCard) {
        // Just update content (No Jitter!)
        updateCardContent(currentCard, agent, isDead);
      } else {
        // Create new
        renderCard(agent, document.getElementById(targetGridId), isDead);
      }
    }

    function renderCard(agent, grid, isCompact) {
      const card = document.createElement('div');
      card.id = `agent-${agent.id}`;
      // Compact vs Full styles
      if (isCompact) {
        card.className = "bg-gray-800/50 border border-gray-700/50 rounded flex justify-between items-center p-4 grayscale hover:grayscale-0 transition-all";
      } else {
        card.className = "bg-gray-800 border border-gray-700 rounded-lg shadow-lg overflow-hidden flex flex-col h-96 transition-all hover:border-emerald-500/50";
      }
      grid.appendChild(card);
      updateCardContent(card, agent, isCompact);
    }

    function updateCardContent(card, agent, isCompact) {
      // Logic for Full Card vs Compact Card HTML
      const cost = agent.metrics?.cost || 0;
      const revenue = agent.metrics?.revenue || 0;
      const profit = revenue - cost;
      const tokens = agent.metrics?.tokens?.toLocaleString() || '0';
      
      const costDisplay = cost.toFixed(4);
      const revenueDisplay = revenue.toFixed(2);
      const profitDisplay = profit.toFixed(2);
      const profitColor = profit >= 0 ? 'text-emerald-400' : 'text-red-400';
      const profitSign = profit >= 0 ? '+' : '';

      let statusColor = 'bg-gray-500';
      if (agent.status === 'working') statusColor = 'bg-emerald-500 animate-pulse';
      if (agent.status === 'error') statusColor = 'bg-yellow-500 animate-bounce';
      if (agent.status === 'killed') statusColor = 'bg-red-600';

      if (isCompact) {
        // --- COMPACT VIEW ---
        card.innerHTML = `
          <div class="flex items-center gap-3">
             <div class="w-2 h-2 rounded-full ${statusColor}"></div>
             <div>
               <div class="font-bold text-gray-400 text-sm">${agent.name}</div>
               <div class="text-[10px] text-gray-600 font-mono">${agent.id}</div>
             </div>
          </div>
        </div>
      `).join('');
    }
  </script>
</body>
</html>
